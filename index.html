<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Simon Says Game</title>
  </head>
  <body>
    <h1>Simon Says Game</h1>
    <p>Press any key to start the game.</p>
    <div class="container">
      <div class="line-one">
        <div id="green" class="btn" type="button"></div>
        <div id="red" class="btn" type="button"></div>
      </div>
      <div class="line-two">
        <div id="yellow" class="btn" type="button"></div>
        <div id="orange" class="btn" type="button"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
